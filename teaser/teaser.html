<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>teaser render</title>
<script type="importmap">{ "imports": { "three": "../vendor/three.module.js" } }</script>
<style>
@font-face { font-family: 'VT323'; src: url('../assets/vt323.woff2') format('woff2'); }
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: #050003; width: 1080px; height: 1920px; overflow: hidden; }
#gl { position: absolute; inset: 0; width: 1080px; height: 1920px; }
.ov { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  flex-direction: column; font-family: 'VT323', monospace; color: #f2ede4; text-align: center;
  pointer-events: none; }
#blackout { position: absolute; inset: 0; background: #050003; }
#flash { position: absolute; inset: 0; background: #c1121f; opacity: 0; }
#term { justify-content: flex-start; align-items: flex-start; padding: 260px 90px; font-size: 64px;
  color: #f2ede4; text-shadow: 0 0 18px rgba(193,18,31,.6); white-space: pre-wrap; text-align: left; }
#question { font-size: 78px; line-height: 1.25; padding: 0 90px;
  text-shadow: 4px 0 0 rgba(193,18,31,.8), -4px 0 0 rgba(140,190,200,.35), 0 0 34px rgba(242,237,228,.5); }
#claim { font-size: 66px; line-height: 1.5; text-shadow: 3px 0 0 rgba(193,18,31,.8), 0 0 26px rgba(242,237,228,.4); }
#title { font-size: 132px; color: #c1121f; letter-spacing: .04em;
  text-shadow: 6px 0 0 rgba(242,237,228,.25), -6px 0 0 rgba(193,18,31,.5), 0 0 60px rgba(193,18,31,.8); }
#subtitle { font-size: 54px; color: #8a7f78; margin-top: 40px; }
#cta { font-size: 60px; color: #f2ede4; margin-top: 90px; border: 2px solid #c1121f; padding: 10px 44px;
  text-shadow: 0 0 20px rgba(193,18,31,.8); }
.scan { position: absolute; inset: 0; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent 0 4px, rgba(0,0,0,.25) 4px 8px); }
.hid { visibility: hidden; }
</style>
</head>
<body>
<canvas id="gl" width="1080" height="1920"></canvas>
<div class="ov" id="q-ov"><div id="question" class="hid"></div></div>
<div class="ov" id="c-ov"><div id="claim" class="hid"></div></div>
<div id="blackout"></div>
<div class="ov" id="term"></div>
<div class="ov" id="t-ov">
  <div id="title" class="hid">the eyes, chico</div>
  <div id="subtitle" class="hid">an experience by sin.ai.da</div>
  <div id="cta" class="hid">link in bio</div>
</div>
<div class="scan"></div>
<div id="flash"></div>
<script type="module" src="teaser.js"></script>
</body>
</html>
